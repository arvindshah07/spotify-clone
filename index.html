<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify_Clone</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
   integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <nav>
    <ul>
      <li class="brand"><img  class="logo"  src="spotify-logo.png"></li>
      <li class="logo-name">Spotify</li>
      <li>Home</li>
      <li>About</li>
    </ul>
  </nav>
  <div class="container">
       <div class="songList">
         <h1>Best Of NCS-10 SONGS LIST </h1>
         <div>
          <div class="songItem">
            <img src="hanuman.webp" alt="1">
            <span>Hanuman Chalisa</span>
            <span class="songlistplay"><span>12:67</span> <i class="fa-solid fa-circle-play"></i></span>
          </div>
          <div class="songItem">
            <img src="cover1.jpeg" alt="1">
            <span> Tere Liye</span>
            <span class="songlistplay"><span>12:67</span> <i class="fa-solid fa-circle-play"></i></span>
          </div>
          <div class="songItem">
            <img src="cover3.jpg" alt="1">
            <span>kabhi jo badal barse</span>
            <span class="songlistplay"><span>12:67</span> <i class="fa-solid fa-circle-play"></i></span>
          </div>
          <div class="songItem">
            <img src="amplifier.jpeg" alt="1">
            <span>Amplifier</span>
            <span class="songlistplay"><span>12:67</span> <i class="fa-solid fa-circle-play"></i></span>
          </div>
          <div class="songItem">
            <img src="cover5.jpg" alt="1">
            <span>Abhi no jao</span>
            <span class="songlistplay"><span>12:67</span> <i class="fa-solid fa-circle-play"></i></span>
          </div>
          <div class="songItem">
            <img src="cover6.jpg" alt="1">
            <span>aap ki nazron</span>
            <span class="songlistplay"><span>12:67</span> <i class="fa-solid fa-circle-play"></i></span>
          </div>
          <div class="songItem">
            <img src="cover7.jpeg" alt="1">
            <span>Yeh shaam mastani</span>
            <span class="songlistplay"><span>12:67</span> <i class="fa-solid fa-circle-play"></i></span>
          </div>
          <div class="songItem">
            <img src="cover8.jpg" alt="1">
            <span>Mujhko barsat banalo</span>
            <span class="songlistplay"><span>12:67</span> <i class="fa-solid fa-circle-play"></i></span>
          </div>
          <div class="songItem">
            <img src="cover9.jpg" alt="1">
            <span>Sanam Teri Kasam</span>
            <span class="songlistplay"><span>12:67</span> <i class="fa-solid fa-circle-play"></i></span>
          </div>
          <div class="songItem">
            <img src="cover10.jpg" alt="1">
            <span>Phir Mohabbat</span>
            <span class="songlistplay"><span>12:67</span> <i class="fa-solid fa-circle-play"></i></span>
          </div>
         </div>
       </div>
       <div class="songBanner"></div>
       
  </div>

  <div class="bottom">
    <input type="range" name="range" id="myProgressBar" min="0" value="0" max="100">
    <div class="icons">
      <i class="fa-solid fa-3x fa-backward-step"></i>
      <i class="fa-solid fa-3x fa-circle-play" id="masterPlay"></i>
      <i class="fa-solid  fa-3x  fa-forward-step"></i>
    </div>
    <div class="songinfo">
      <img src="musicGIF.gif" id="gif" width="100px" height="30px"><span class="songTitle">Tere Liye</span>
    </div>
  </div>
  <script src="script.js"></script>

</body>
</html>
